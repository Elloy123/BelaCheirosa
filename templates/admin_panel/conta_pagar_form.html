{% extends 'admin_panel/base.html' %}
{% block title %}Novo boleto{% endblock %}
{% block content %}
<h1 class="h4 text-rose mb-3">Novo boleto/conta a pagar</h1>
<div class="card border-0 shadow-sm"><div class="card-body">
<form method="post" class="row g-2">{% csrf_token %}
  <div class="col-md-6"><label class="form-label">Fornecedor</label><input name="fornecedor" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Referência</label><input name="referencia" class="form-control" required></div>
  
  <div class="col-md-4"><label class="form-label">Valor total do boleto</label><input type="number" step="0.01" name="valor_total" id="inputValorTotal" class="form-control" required></div>
  <div class="col-md-4"><label class="form-label">Quantidade de parcelas</label><input type="number" min="1" name="parcelas" id="inputParcelas" class="form-control" value="1" required></div>
  <div class="col-md-4"><label class="form-label">Vencimento (1ª parcela)</label><input type="date" name="vencimento" id="inputVencimento" class="form-control" required></div>
  
  <div class="col-md-6"><label class="form-label">Parcelas pagas</label><input type="number" min="0" name="parcelas_pagas" id="inputParcelasPagas" class="form-control" value="0"></div>
  <div class="col-md-6"><label class="form-label">Data do pagamento</label><input type="date" name="data_pagamento" class="form-control"></div>
  
  <div class="col-12">
    <label class="form-label fw-semibold">Previsão de parcelas</label>
    <div class="card bg-light border">
      <div class="table-responsive" style="max-height:300px;overflow-y:auto;">
        <table class="table table-sm mb-0 admin-table">
          <thead class="sticky-top bg-white">
            <tr><th>#</th><th>Data vencimento</th><th>Valor</th><th>Status</th></tr>
          </thead>
          <tbody id="tabelaParcelas">
            <tr><td colspan="4" class="text-center text-muted py-3">Preencha os campos acima para ver as parcelas</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="col-md-8"><label class="form-label">Observação</label><input name="observacao" class="form-control"></div>
  <div class="col-12"><button class="btn btn-rose">Salvar</button></div>
</form>
</div></div>
{% endblock %}

{% block extra_js %}
<script>
(function(){
  const inputValor = document.getElementById('inputValorTotal');
  const inputParcelas = document.getElementById('inputParcelas');
  const inputVencimento = document.getElementById('inputVencimento');
  const inputParcelasPagas = document.getElementById('inputParcelasPagas');
  const inputDataPagamento = document.querySelector('input[name="data_pagamento"]');
  const tbody = document.getElementById('tabelaParcelas');

  function addMonths(date, months) {
    const d = new Date(date);
    d.setMonth(d.getMonth() + months);
    return d;
  }

  function formatDate(date) {
    return date.toLocaleDateString('pt-BR');
  }

  function renderParcelas() {
    tbody.innerHTML = '';
    
    const valor_total = parseFloat(inputValor.value) || 0;
    const num_parcelas = parseInt(inputParcelas.value) || 1;
    const vencimento = inputVencimento.value;
    const parcelas_pagas = parseInt(inputParcelasPagas.value) || 0;

    if (!valor_total || !vencimento) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">Preencha os campos acima para ver as parcelas</td></tr>';
      return;
    }

    const valor_parcela = valor_total / num_parcelas;
    const data_base = new Date(vencimento);

    for (let i = 1; i <= num_parcelas; i++) {
      const data_vencimento = addMonths(data_base, i - 1);
      const status = i <= parcelas_pagas ? '✅ Paga' : '⏱ Pendente';
      const statusClass = i <= parcelas_pagas ? 'text-success fw-bold' : 'text-warning';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="small fw-semibold">#${i}</td>
        <td class="small">${formatDate(data_vencimento)}</td>
        <td class="small">R$ ${valor_parcela.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
        <td class="small ${statusClass}">${status}</td>
      `;
      tbody.appendChild(tr);
    }
  }

  inputValor.addEventListener('change', renderParcelas);
  inputValor.addEventListener('input', renderParcelas);
  inputParcelas.addEventListener('change', renderParcelas);
  inputParcelas.addEventListener('input', renderParcelas);
  inputVencimento.addEventListener('change', renderParcelas);
  inputParcelasPagas.addEventListener('change', renderParcelas);
  inputParcelasPagas.addEventListener('input', renderParcelas);

  function garantirDataPagamento() {
    const parcelasPagas = parseInt(inputParcelasPagas.value || '0', 10) || 0;
    if (parcelasPagas > 0 && inputDataPagamento && !inputDataPagamento.value) {
      inputDataPagamento.value = new Date().toISOString().slice(0, 10);
    }
  }

  inputParcelasPagas.addEventListener('change', garantirDataPagamento);
  inputParcelasPagas.addEventListener('input', garantirDataPagamento);
})();
</script>
{% endblock %}
