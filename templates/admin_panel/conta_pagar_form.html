{% extends 'admin_panel/base.html' %}
{% block title %}Novo boleto{% endblock %}
{% block content %}
<h1 class="h4 text-rose mb-3">Novo boleto/conta a pagar</h1>
<div class="card border-0 shadow-sm"><div class="card-body">
<form method="post" class="row g-2">{% csrf_token %}
  <div class="col-md-6"><label class="form-label">Fornecedor</label><input name="fornecedor" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Referência</label><input name="referencia" class="form-control" required></div>
  <div class="col-md-4"><label class="form-label">Valor por parcela</label><input type="number" step="0.01" name="valor_total" class="form-control" required></div>
  <div class="col-md-4"><label class="form-label">Quantidade de parcelas</label><input type="number" min="1" name="parcelas" class="form-control" value="1" required></div>
  <div class="col-md-4"><label class="form-label">Valor pago</label><input type="number" step="0.01" name="valor_pago" class="form-control" value="0"></div>
  <div class="col-md-4"><label class="form-label">Vencimento</label><input type="date" name="vencimento" class="form-control" required></div>
  <div class="col-md-4"><label class="form-label">Data do pagamento</label><input type="date" name="data_pagamento" class="form-control"></div>
  <div class="col-md-4"><label class="form-label">Status</label><input class="form-control" value="Calculado automaticamente" disabled></div>
  <div class="col-md-8"><label class="form-label">Observação</label><input name="observacao" class="form-control"></div>
  <div class="col-12"><button class="btn btn-rose">Salvar</button></div>
</form>
</div></div>
{% endblock %}
