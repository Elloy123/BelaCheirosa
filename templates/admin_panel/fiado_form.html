{% extends 'admin_panel/base.html' %}
{% block title %}Novo fiado{% endblock %}
{% block content %}
<h1 class="h4 text-rose mb-3">Novo registro de fiado</h1>
<div class="card border-0 shadow-sm"><div class="card-body">
<form method="post" class="row g-2">{% csrf_token %}
  <div class="col-md-6"><label class="form-label">Cliente</label><select name="cliente_id" class="form-select" required>{% for c in clientes %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}</select></div>
  <div class="col-md-6"><label class="form-label">Referência</label><input name="referencia" class="form-control" placeholder="Ex: Lançamento manual de fiado"></div>
  <div class="col-md-4"><label class="form-label">Valor total</label><input type="number" step="0.01" name="valor_total" class="form-control" required></div>
  <div class="col-md-4"><label class="form-label">Número de parcelas</label><input type="number" min="1" name="parcelas" class="form-control" value="1" required></div>
  <div class="col-md-4"><label class="form-label">Primeiro vencimento</label><input type="date" name="vencimento" class="form-control" required></div>
  <div class="col-md-12"><label class="form-label">Observação</label><input name="observacao" class="form-control" placeholder="Opcional"></div>
  <div class="col-12"><div class="alert alert-light border small mb-0">Os produtos do fiado serão lançados no PDV. Este cadastro manual registra apenas o financeiro parcelado.</div></div>
  <div class="col-12"><button class="btn btn-rose">Salvar</button></div>
</form>
</div></div>
{% endblock %}
