<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Painel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f6f7fb; }
    .text-rose{ color:#c2185b; }
    .btn-rose{ background:#c2185b;color:#fff;border:0; }
    .btn-rose:hover{ background:#9f1450;color:#fff; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#c2185b">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">Painel Comercial</a>
    <div class="d-flex gap-2">
      <a class="btn btn-light btn-sm" href="{% url 'home' %}">Ver loja</a>
      <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="btn btn-outline-light btn-sm">Sair</button></form>
    </div>
  </div>
</nav>
<div class="container-fluid py-3">
  <div class="row">
    <aside class="col-lg-2 mb-3">
      <div class="list-group shadow-sm">
        <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action">Dashboard</a>
        <a href="{% url 'lista_pedidos' %}" class="list-group-item list-group-item-action">Pedidos pendentes</a>
        <a href="{% url 'lista_vendas' %}" class="list-group-item list-group-item-action">Vendas</a>
        <a href="{% url 'lista_produtos' %}" class="list-group-item list-group-item-action">Produtos</a>
        <a href="{% url 'lista_estoque' %}" class="list-group-item list-group-item-action">Estoque</a>
        <a href="{% url 'lista_fiados' %}" class="list-group-item list-group-item-action">Clientes fiado</a>
        <a href="{% url 'lista_contas_pagar' %}" class="list-group-item list-group-item-action">Boletos mercadorias</a>
        <a href="{% url 'lista_clientes' %}" class="list-group-item list-group-item-action">Clientes</a>
      </div>
    </aside>
    <main class="col-lg-10">
      {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>{% endfor %}{% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</body>
</html>
