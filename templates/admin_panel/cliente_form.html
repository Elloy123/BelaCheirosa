{% extends 'admin_panel/base.html' %}
{% block title %}Cliente{% endblock %}
{% block content %}
<h1 class="h4 text-rose mb-3">{% if cliente %}Editar{% else %}Novo{% endif %} Cliente</h1>
<div class="card border-0 shadow-sm"><div class="card-body">
  <form method="post">
    {% csrf_token %}
    <div class="row g-2">{{ form.as_p }}</div>
    <button class="btn btn-rose">Salvar</button>
  </form>
</div></div>
{% endblock %}
